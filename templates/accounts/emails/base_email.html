<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% block subject %}{{ site_name }}{% endblock %}</title>
  <style>
    /* ── Reset ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }

    /* ── Base ── */
    body {
      background-color: #0D0D0D;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #CCCCCC;
      margin: 0;
      padding: 0;
    }

    /* ── Wrapper ── */
    .email-wrapper {
      width: 100%;
      background-color: #0D0D0D;
      padding: 40px 16px;
    }

    /* ── Container ── */
    .email-container {
      max-width: 580px;
      margin: 0 auto;
      background-color: #141414;
      border: 0.5px solid #2A2A2A;
      border-radius: 12px;
      overflow: hidden;
    }

    /* ── Header ── */
    .email-header {
      background-color: #141414;
      border-bottom: 0.5px solid #2A2A2A;
      padding: 28px 40px;
    }
    .email-brand {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      text-decoration: none;
    }
    .email-brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #C9A84C;
      letter-spacing: -0.02em;
    }
    .email-brand-sub {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888888;
    }

    /* ── Body ── */
    .email-body {
      padding: 40px 40px 32px;
    }
    .email-gold-line {
      display: block;
      width: 36px;
      height: 2px;
      background-color: #C9A84C;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    .email-heading {
      font-size: 22px;
      font-weight: 700;
      color: #F0EBE0;
      letter-spacing: -0.015em;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    .email-text {
      font-size: 15px;
      color: #CCCCCC;
      line-height: 1.65;
      margin-bottom: 16px;
    }
    .email-text:last-of-type {
      margin-bottom: 0;
    }
    .email-muted {
      color: #888888;
      font-size: 13px;
    }

    /* ── CTA Button ── */
    .email-cta-wrapper {
      margin: 32px 0;
      text-align: center;
    }
    .email-cta {
      display: inline-block;
      background-color: #C9A84C;
      color: #0D0D0D !important;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 8px;
      letter-spacing: 0.01em;
    }

    /* ── Info box ── */
    .email-info-box {
      background-color: #1A1A1A;
      border: 0.5px solid #2A2A2A;
      border-left: 3px solid #C9A84C;
      border-radius: 8px;
      padding: 16px 20px;
      margin: 24px 0;
    }
    .email-info-box p {
      font-size: 14px;
      color: #CCCCCC;
      margin: 0;
      line-height: 1.6;
    }

    /* ── Danger box ── */
    .email-danger-box {
      background-color: #2A1A1A;
      border: 0.5px solid #4A2424;
      border-left: 3px solid #E05252;
      border-radius: 8px;
      padding: 16px 20px;
      margin: 24px 0;
    }
    .email-danger-box p {
      font-size: 14px;
      color: #E05252;
      margin: 0;
      line-height: 1.6;
    }

    /* ── Divider ── */
    .email-divider {
      border: none;
      border-top: 0.5px solid #2A2A2A;
      margin: 28px 0;
    }

    /* ── URL fallback ── */
    .email-url-fallback {
      word-break: break-all;
      color: #C9A84C;
      font-size: 13px;
    }

    /* ── Footer ── */
    .email-footer {
      background-color: #0D0D0D;
      border-top: 0.5px solid #2A2A2A;
      padding: 24px 40px;
      text-align: center;
    }
    .email-footer p {
      font-size: 12px;
      color: #555555;
      line-height: 1.6;
      margin-bottom: 4px;
    }
    .email-footer a {
      color: #888888;
      text-decoration: none;
    }
    .email-footer a:hover {
      color: #C9A84C;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .email-body   { padding: 28px 24px 24px; }
      .email-header { padding: 20px 24px; }
      .email-footer { padding: 20px 24px; }
      .email-heading { font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="email-wrapper">
  <div class="email-container">

    <!-- Header -->
    <div class="email-header">
      <a href="{{ site_domain }}" class="email-brand" style="text-decoration:none;">
        <span class="email-brand-name">Tamasha</span>
        <span class="email-brand-sub">Events</span>
      </a>
    </div>

    <!-- Body -->
    <div class="email-body">
      <span class="email-gold-line"></span>
      {% block email_body %}{% endblock %}
    </div>

    <!-- Footer -->
    <div class="email-footer">
      <p>This email was sent by <strong style="color:#888888;">{{ site_name }}</strong></p>
      <p>
        <a href="{{ site_domain }}/terms/">Terms</a> &nbsp;&middot;&nbsp;
        <a href="{{ site_domain }}/privacy/">Privacy</a> &nbsp;&middot;&nbsp;
        <a href="{{ site_domain }}">{{ site_domain|cut:"https://"|cut:"http://" }}</a>
      </p>
      <p style="margin-top:12px;">&copy; {% now "Y" %} {{ site_name }}. All rights reserved.</p>
    </div>

  </div>
</div>
</body>
</html>
