{% load static %}
<title>{% if seo_title %}{{ seo_title }}{% else %}{{ SITE_NAME }}{% endif %}</title>
<meta name="description" content="{% if seo_description %}{{ seo_description }}{% else %}{{ SITE_DESCRIPTION }}{% endif %}">
<link rel="canonical" href="{% if seo_canonical %}{{ seo_canonical }}{% else %}{{ SITE_DOMAIN }}{{ request.path }}{% endif %}">
<meta name="robots" content="{% if seo_robots %}{{ seo_robots }}{% else %}index, follow{% endif %}">

{# Open Graph #}
<meta property="og:site_name"   content="{{ SITE_NAME }}">
<meta property="og:type"        content="{% if seo_og_type %}{{ seo_og_type }}{% else %}website{% endif %}">
<meta property="og:title"       content="{% if seo_title %}{{ seo_title }}{% else %}{{ SITE_NAME }}{% endif %}">
<meta property="og:description" content="{% if seo_description %}{{ seo_description }}{% else %}{{ SITE_DESCRIPTION }}{% endif %}">
<meta property="og:url"         content="{% if seo_canonical %}{{ seo_canonical }}{% else %}{{ SITE_DOMAIN }}{{ request.path }}{% endif %}">
<meta property="og:image"       content="{% if seo_image %}{{ seo_image }}{% else %}{{ SITE_DOMAIN }}{% static 'images/og-default.jpg' %}{% endif %}">
<meta property="og:image:width"  content="1200">
<meta property="og:image:height" content="630">

{# Twitter / X Card #}
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="{% if seo_title %}{{ seo_title }}{% else %}{{ SITE_NAME }}{% endif %}">
<meta name="twitter:description" content="{% if seo_description %}{{ seo_description }}{% else %}{{ SITE_DESCRIPTION }}{% endif %}">
<meta name="twitter:image"       content="{% if seo_image %}{{ seo_image }}{% else %}{{ SITE_DOMAIN }}{% static 'images/og-default.jpg' %}{% endif %}">
